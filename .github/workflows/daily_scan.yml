name: Master Stock Scan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  # פותר את האזהרה שקיבלת ומכריח שימוש ב-Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7 # גרסה מעודכנת
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.1.1 # גרסה מעודכנת
        with:
          python-version: '3.11' # שדרוג לגרסת פייתון חדישה יותר

      - name: Install dependencies
        run: pip install yfinance pandas lxml html5lib requests

      - name: Run scanner
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git stash 
          git pull --rebase origin main
          git stash pop || echo "No changes to pop"
          
          git add index.html
          git commit -m "Automated stock scan update" || echo "No changes to commit"
          git push origin main

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
