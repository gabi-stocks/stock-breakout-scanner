name: Daily Stock Breakout Scan

on:
  schedule:
    - cron: '0 20 * * *' # ריצה ב-22:00 שעון ישראל
  workflow_dispatch: 

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries Directly
        # כאן אנחנו מתקינים את הספריות ישירות בלי צורך בקובץ requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas pandas_ta requests beautifulsoup4 lxml html5lib

      - name: Run Scanner
        run: python scanner.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: stock-results
          path: scan_results.csv
